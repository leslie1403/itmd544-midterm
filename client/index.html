<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Client</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        background-color: #f4f7f6;
      }
      h1, h2 {
        color: #2c3e50;
      }
      .card {
        background: #fff;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
      .book-item {
        border-bottom: 1px solid #eee;
        padding: 10px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .book-item:last-child {
        border-bottom: none;
      }
      button {
        background-color: #3498db;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.3s;
      }
      button:hover {
        background-color: #2980b9;
      }
      .btn-danger {
        background-color: #e74c3c;
      }
      .btn-danger:hover {
        background-color: #c0392b;
      }
      input, select {
        padding: 8px;
        margin: 5px 0 15px;
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        font-weight: bold;
      }
      pre {
        background-color: #eee;
        padding: 10px;
        border-radius: 4px;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <h1>Library Management System</h1>
    
    <div class="card">
      <h2>Add New Book</h2>
      <form id="createBookForm">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="title" required />
        </div>
        <div class="form-group">
          <label>Author</label>
          <input type="text" id="author" required />
        </div>
        <div class="form-group">
          <label>ISBN</label>
          <input type="text" id="isbn" required />
        </div>
        <div class="form-group">
          <label>Genre</label>
          <select id="genre" required>
            <option value="fiction">Fiction</option>
            <option value="non-fiction">Non-Fiction</option>
            <option value="fantasy">Fantasy</option>
            <option value="sci-fi">Sci-Fi</option>
            <option value="mystery">Mystery</option>
          </select>
        </div>
        <div class="form-group">
          <label>Published Year</label>
          <input type="number" id="publishedYear" required />
        </div>
        <button type="submit">Create Book</button>
      </form>
    </div>

    <div class="card">
      <h2>Library Stats</h2>
      <button id="loadStatsBtn">Load Statistics</button>
      <div id="statsResult" style="margin-top: 10px; display: none;">
        <pre id="statsOutput"></pre>
      </div>
    </div>

    <div class="card">
      <h2>Book List</h2>
      <div id="bookList">Loading books...</div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
